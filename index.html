<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>採用情報 | ニチレイロジグループ採用</title>
  <meta name="description" content="ニチレイロジグループの​採用サイトです。​採用情報を​ご紹介します。​" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="robots" content="index,follow" />

  <!-- OGP -->
  <meta property="og:locale" content="ja_JP" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="採用情報 | ニチレイロジグループ採用" />
  <meta property="og:description" content="ニチレイロジグループの​採用サイトです。​採用情報を​ご紹介します。​" />
  <meta property="og:url" content="https://recruit.nichirei-logi.co.jp/" />
  <meta property="og:site_name" content="採用情報 | ニチレイロジグループ採用" />
  <meta property="og:image" content="https://recruit.nichirei-logi.co.jp/assets/images/webp/OGP.webp" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="採用情報 | ニチレイロジグループ採用" />
  <meta name="twitter:description" content="ニチレイロジグループの​採用サイトです。​採用情報を​ご紹介します。​" />
  <meta name="twitter:image" content="https://recruit.nichirei-logi.co.jp/assets/images/webp/OGP.webp" />

  <link rel="stylesheet" href="./assets/css/style.css?ver=1.0.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed&family=Noto+Sans+JP:wght@100..900&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>
  <!-- ヘッダー -->
  <header class="header">
    <div class="header__inner">
      <a href="./" class="header__logo">
        <img src="./assets/images/webp/logo.webp" alt="ニチレイロジグループ RECRUITING" width="192" height="26" />
        <span class="header__logo-text">RECRUITING</span>
      </a>
      <nav class="header__nav">
        <a href="#" class="header__nav-btn header__nav-btn--entry">ENTRY</a>
        <a href="https://nichireilogi-recruit.snar.jp/login.aspx" class="header__nav-btn header__nav-btn--mypage" target="_blank" rel="noopener noreferrer">MY PAGE</a>
      </nav>
    </div>
  </header>

  <main id="main-content" class="main-content">
    <!-- KV（ファーストビュー） -->
    <section class="fv">
      <div class="fv__images">
        <div class="fv__img fv__img--left">
          <img src="./assets/images/webp/fv_img01.webp" alt="" />
        </div>
        <div class="fv__img fv__img--right">
          <img src="./assets/images/webp/fv_img02.webp" alt="" />
        </div>
      </div>
      <div class="fv__pattern">
        <div class="fv__pattern-left">
          <img src="./assets/images/svg/fv_pattern_left.svg" alt="" />
        </div>
        <div class="fv__pattern-right">
          <img src="./assets/images/svg/fv_pattern_right.svg" alt="" />
        </div>
      </div>
      <div class="fv__catchcopy">
        <picture>
          <source media="(max-width: 768px)" srcset="./assets/images/webp/sp/catchcopy.webp">
          <img src="./assets/images/webp/catchcopy.webp" alt="私たちにしか運べない鮮度がある。" />
        </picture>
      </div>
      <div class="fv__bg"></div>
    </section>

    <!-- NEWS -->
    <section class="news">
      <div class="news__inner">
        <h2 class="news__title">NEWS</h2>
        <a href="#" class="news__text">2026.04.01 採用ホームページをリニューアルしました。</a>
      </div>
    </section>

    <!-- 採用情報 + COMING SOON -->
    <div class="section-wrapper">
      <div class="section-wrapper__pattern">
        <img src="./assets/images/svg/section_pattern.svg" alt="" />
      </div>

      <section class="recruit">
        <div class="recruit__bg"></div>
        <div class="recruit__inner">
          <div class="recruit__heading">
            <h2 class="recruit__title">採用情報</h2>
            <p class="recruit__subtitle">RECRUIT</p>
          </div>

          <!-- 全国総合職 -->
          <div class="recruit__category">
            <h3 class="recruit__category-title">全国総合職</h3>
            <div class="recruit__btns recruit__btns--single">
              <button type="button" class="recruit__btn recruit__btn--full" data-modal-id="zenkoku">
                <span>募集要項</span>
                <span class="recruit__btn-arrow"><img src="./assets/images/svg/arrow-right.svg" alt="" /></span>
              </button>
            </div>
          </div>

          <!-- エンジニア職 -->
          <div class="recruit__category">
            <h3 class="recruit__category-title">エンジニア職</h3>
            <div class="recruit__btns recruit__btns--half">
              <button type="button" class="recruit__btn" data-modal-id="engineer-zenkoku">
                <span>全国総合職（エンジニア）</span>
                <span class="recruit__btn-arrow"><img src="./assets/images/svg/arrow-right.svg" alt="" /></span>
              </button>
              <button type="button" class="recruit__btn" data-modal-id="engineer-chiiki">
                <span>地域総合職（エンジニア）</span>
                <span class="recruit__btn-arrow"><img src="./assets/images/svg/arrow-right.svg" alt="" /></span>
              </button>
            </div>
          </div>

          <!-- 地域総合職 -->
          <div class="recruit__category">
            <h3 class="recruit__category-title">地域総合職</h3>
            <div class="recruit__btns recruit__btns--third">
              <button type="button" class="recruit__btn" data-modal-id="chiiki-hokkaido">
                <span>北海道エリア</span>
                <span class="recruit__btn-arrow"><img src="./assets/images/svg/arrow-right.svg" alt="" /></span>
              </button>
              <button type="button" class="recruit__btn" data-modal-id="chiiki-tohoku">
                <span>東北エリア</span>
                <span class="recruit__btn-arrow"><img src="./assets/images/svg/arrow-right.svg" alt="" /></span>
              </button>
              <button type="button" class="recruit__btn" data-modal-id="chiiki-kanto">
                <span>関東エリア</span>
                <span class="recruit__btn-arrow"><img src="./assets/images/svg/arrow-right.svg" alt="" /></span>
              </button>
              <button type="button" class="recruit__btn" data-modal-id="chiiki-tokai">
                <span>東海エリア</span>
                <span class="recruit__btn-arrow"><img src="./assets/images/svg/arrow-right.svg" alt="" /></span>
              </button>
              <button type="button" class="recruit__btn" data-modal-id="chiiki-kansai">
                <span>関西エリア</span>
                <span class="recruit__btn-arrow"><img src="./assets/images/svg/arrow-right.svg" alt="" /></span>
              </button>
              <button type="button" class="recruit__btn" data-modal-id="chiiki-chushikoku">
                <span>中四国エリア</span>
                <span class="recruit__btn-arrow"><img src="./assets/images/svg/arrow-right.svg" alt="" /></span>
              </button>
              <button type="button" class="recruit__btn" data-modal-id="chiiki-kyushu">
                <span>九州エリア</span>
                <span class="recruit__btn-arrow"><img src="./assets/images/svg/arrow-right.svg" alt="" /></span>
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- COMING SOON -->
      <section class="coming-soon">
        <div class="coming-soon__inner">
          <img src="./assets/images/webp/coming-soon.webp" alt="" class="coming-soon__bg-img" />
          <div class="coming-soon__content">
            <h2 class="coming-soon__title">COMING SOON</h2>
            <p class="coming-soon__text">コンテンツは順次公開予定</p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- フッター -->
  <footer class="footer">
    <div class="footer__inner">
      <a href="./" class="footer__logo">
        <img src="./assets/images/webp/logo.webp" alt="ニチレイロジグループ RECRUITING" width="289" height="32" />
        <span class="footer__logo-text">RECRUITING</span>
      </a>
      <p class="footer__copyright">Copyright（C）NICHIREI LOGISTICS GROUP INC.</p>
    </div>
  </footer>

  <!-- モーダル：募集要項 -->
  <div class="modal" id="modal-recruit">
    <div class="modal__overlay" data-modal-close></div>
    <div class="modal__container">
      <div class="modal__content">
        <div class="modal__title-wrap">
          <h2 class="modal__title">募集要項</h2>
        </div>
        <div class="modal__table" id="modal-table"></div>
        <div class="modal__buttons">
          <div class="modal__buttons-row">
            <a href="#" class="modal__btn modal__btn--entry">ENTRY</a>
            <a href="https://nichireilogi-recruit.snar.jp/login.aspx" class="modal__btn modal__btn--mypage" target="_blank" rel="noopener noreferrer">MY PAGE</a>
          </div>
          <button class="modal__close" data-modal-close>
            <span class="modal__close-icon"></span>
            <span class="modal__close-text">CLOSE</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="./assets/js/app.js" defer></script>
</body>

</html>
